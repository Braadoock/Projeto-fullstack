<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Projeto</title>
</head>
<body>
    <div id="tela-login">
    Usuario: <input type="text" id="username" placeholder="Digite seu usuário">
    Senha: <input type="password" id="password" placeholder="Digite sua senha">
    <button onclick="login()">Login</button>
    </div>

    <header style="display:none" id="header">
        <h1>Cadastre seu link</h1>
        <div>
            <button onclick="toggleTema()">🌙 / ☀️</button>
            <button onclick="logout()">Sair</button>
        </div>
    </header>

    <main style="display:none" id="main">
        <aside>
            <form action="">
                <input type="text" id="titulo" placeholder="Título">
                <input type="text" id="url" placeholder="URL">
                <button onclick="salvarLink()">Salvar</button>
            </form>
        </aside>
        <section id="lista-links"></section>
    </main>

    <script src="app.js"></script>


</body>
</html>
