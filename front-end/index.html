<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Projeto</title>
</head>
<body>
    <header>
        <h1>Cadastre seu link</h1>
        <button onclick="toggleTema()">🌙 / ☀️</button>
    </header>

    <main>
        <aside>
            <form action="">
                <input type="text" id="titulo" placeholder="Título">
                <input type="text" id="url" placeholder="URL">
                    <select id="publicado">
                        <option value="0">Não publicar</option>
                        <option value="1">Publicar</option>
                    </select>
                <button onclick="salvarLink()">Salvar</button>
            </form>
        </aside>
        <section id="lista-links"></section>
    </main>


    <script src="app.js"></script>


</body>
</html>
